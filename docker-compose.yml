services:
  postgres:
    image: postgres:16-alpine
    container_name: renova-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: renova
      POSTGRES_PASSWORD: renova
      POSTGRES_DB: renova
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renova -d renova"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
