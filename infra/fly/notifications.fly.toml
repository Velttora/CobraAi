app = "cobrai-notifications"
primary_region = "gru"

[build]
  dockerfile = "../../Dockerfile"
  [build.args]
    APP_NAME = "service-notifications"

[env]
  PORT                = "8080"
  NODE_ENV            = "production"
  HOST                = "0.0.0.0"
  KAFKA_CLIENT_ID     = "service-notifications"
  SENDGRID_FROM_EMAIL = "noreply@cobrai.dev"

# fly secrets set --config infra/fly/notifications.fly.toml \
#   DATABASE_URL="postgresql://..." \
#   REDIS_URL="redis://..." \
#   KAFKA_BROKERS="host:9092" \
#   SENDGRID_API_KEY="SG...." \
#   TWILIO_ACCOUNT_SID="AC..." \
#   TWILIO_AUTH_TOKEN="..." \
#   TWILIO_WA_FROM="whatsapp:+1..." \
#   TWILIO_WA_WEBHOOK_URL="https://.../api/v1/webhooks/twilio-whatsapp" \
#   VAPI_API_KEY="..." \
#   VAPI_AGENT_ID="..." \
#   OPENAI_API_KEY="sk-..."

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/api/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
